<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src %CSP_SOURCE% data: https:; script-src %CSP_SOURCE%; style-src 'unsafe-inline' %CSP_SOURCE%;" />
    <title>CodeSnap Neo 📸</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./dist/dom-to-image-more.min.js"></script>
    <script type="module" src="./dist/index.js"></script>
</head>

<body class="flex flex-col w-screen h-screen overflow-hidden pt-0">
    <div id="toolbar">
        <button id="showLineNumBtn" class="toolbar-button icon-button" type="button"
            title="Toggle line numbers" aria-label="Toggle line numbers" aria-pressed="true">#</button>

        <div id="highlight-modes" role="group" aria-label="Line highlight mode">
            <button id="highlightFocusBtn" class="mode-button is-active" type="button" title="Focus highlight"
                aria-pressed="true"><span class="mode-swatch focus-swatch"></span>Focus</button>
            <button id="highlightAddBtn" class="mode-button" type="button" title="Added line highlight"
                aria-pressed="false"><span class="mode-swatch add-swatch">+</span>Added</button>
            <button id="highlightRemoveBtn" class="mode-button" type="button" title="Removed line highlight"
                aria-pressed="false"><span class="mode-swatch remove-swatch">-</span>Removed</button>
            <button id="highlightClearBtn" class="mode-button" type="button" title="Clear line highlight"
                aria-pressed="false"><span class="mode-swatch clear-swatch">x</span>Clear</button>
        </div>

        <div id="export-actions">
            <button id="btnCopy" class="toolbar-button" type="button">Copy</button>
            <button id="btnSave" class="toolbar-button primary-button" type="button">Save</button>
        </div>
    </div>

    <div class="flex-1 w-full overflow-auto flex justify-center p-0">
        <div id="snippet-scroll">
            <div id="snippet-container">
                <div id="window">
                    <div id="snippet"></div>
                </div>
            </div>
        </div>

        <div id="flash-fx"></div>

    </div>
</body>

</html>
